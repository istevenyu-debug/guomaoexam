<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>等待審核 - 國貿丙檢練習平台</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);">
  <div class="topbar">
    <div class="logo">國貿丙檢 <span>練習平台</span></div>
    <button class="btn btn-sm" id="logout-btn">登出</button>
  </div>

  <div class="pending-wrap">
    <div class="pending-box">
      <div style="font-size:48px;margin-bottom:16px;">⏳</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px;">等待老師審核</div>
      <div style="font-size:13px;color:var(--text3);line-height:1.7;margin-bottom:20px;">
        你的申請已送出！<br>
        老師審核通過後，你就可以開始練習了。<br>
        請稍待，或聯繫老師確認審核狀態。
      </div>
      <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;text-align:left;">
        <div style="font-weight:600;margin-bottom:6px;">你的申請資料：</div>
        <div id="user-info" style="color:var(--text2);line-height:1.8;"></div>
      </div>
      <button class="btn" style="width:100%;margin-top:16px;" onclick="checkStatus()">重新確認審核狀態</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./js/config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "index.html"; return; }
  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists()) { window.location.href = "onboard.html"; return; }
  const data = snap.data();
  if (data.status === "active") { window.location.href = "student.html"; return; }
  document.getElementById("user-info").innerHTML =
    `姓名：${data.name || "—"}<br>班級：${data.class || "—"}<br>學校：${data.school || "—"}<br>Email：${user.email}`;
});

window.checkStatus = async () => {
  const user = auth.currentUser;
  if (!user) return;
  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.data()?.status === "active") {
    window.location.href = "student.html";
  } else {
    alert("尚未通過審核，請稍待或聯繫老師。");
  }
};

document.getElementById("logout-btn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "index.html";
});
</script>
</body>
</html>
