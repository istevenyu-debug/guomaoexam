<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d5a3d">
<title>國貿丙檢練習平台</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:360px;max-width:100%;text-align:center;}
.login-logo{font-size:32px;margin-bottom:10px;}
.login-title{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
.login-note{font-size:11px;color:var(--text3);margin-top:16px;line-height:1.7;}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">📚</div>
    <div class="login-title">國貿丙檢練習平台</div>
    <div class="login-sub">國際貿易實務學科線上練習</div>

    <button class="btn btn-google" id="google-login-btn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      使用 Google 帳號登入
    </button>

    <div class="login-note">
      本平台使用 Google 登入<br>
      僅取得姓名與 Email 供身份識別<br>
      不會用於其他用途
    </div>

    <!-- 開發者模式：點 LOGO 5下才出現 -->
    <div id="dev-panel" style="display:none;margin-top:20px;padding:14px;background:#f0ede6;border-radius:8px;border:1px dashed #c8c2b4;">
      <div style="font-size:11px;color:#9e9890;margin-bottom:10px;font-weight:600;">🛠 開發者預覽模式</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button onclick="devLogin('teacher')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">👩‍🏫 以老師身份進入</button>
        <button onclick="devLogin('student-active')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">🎓 以學生身份進入（已審核）</button>
        <button onclick="devLogin('student-pending')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">⏳ 以學生身份進入（待審核）</button>
        <button onclick="devLogin('public')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">💼 以社會人士身份進入</button>
        <button onclick="devLogin('onboard')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">👋 首次設定頁面</button>
      </div>
    </div>
  </div>
</div>

<script>
// 點 LOGO 5下才顯示開發者模式
let clickCount = 0;
document.querySelector('.login-logo').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 3) {
    document.getElementById('dev-panel').style.display = 'block';
    clickCount = 0;
  }
});

// 網址加 ?dev 直接開啟開發者面板
if (new URLSearchParams(location.search).get('dev') !== null) {
  document.getElementById('dev-panel').style.display = 'block';
}

function devLogin(type) {
  if (type === 'teacher') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'teacher', name: '陳老師', email: 'istevenyu@gmail.com'
    }));
    window.location.href = 'teacher.html?dev=1';
  } else if (type === 'student-active') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'student', status: 'active', name: '王小明',
      email: 'student@test.com', class: '201', school: '測試學校'
    }));
    window.location.href = 'student.html?dev=1';
  } else if (type === 'student-pending') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'student', status: 'pending', name: '李大華',
      email: 'student2@test.com', class: '202', school: '測試學校'
    }));
    window.location.href = 'pending.html?dev=1';
  } else if (type === 'public') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'public', status: 'active', name: '張志遠',
      email: 'public@test.com', occupation: '上班族', purpose: '應試準備（丙級檢定）'
    }));
    window.location.href = 'student.html?dev=1';
  } else if (type === 'onboard') {
    window.location.href = 'onboard.html?dev=1';
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig, TEACHER_EMAIL } from "./js/config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// 監聽登入狀態
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  // 老師直接進老師端
  if (user.email === TEACHER_EMAIL) {
    window.location.href = "teacher.html";
    return;
  }

  // 查詢用戶資料
  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists()) {
    // 新用戶 → 首次設定
    window.location.href = "onboard.html";
    return;
  }

  const data = snap.data();

  // 學生：待審核
  if (data.role === "student" && data.status === "pending") {
    window.location.href = "pending.html";
    return;
  }

  // 學生：被停權
  if (data.status === "suspended") {
    alert("您的帳號已被停用，請聯繫老師。");
    await auth.signOut();
    return;
  }

  // 正常進入學生端
  window.location.href = "student.html";
});

// Google 登入
document.getElementById("google-login-btn").addEventListener("click", async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    alert("登入失敗：" + e.message);
  }
});
</script>

<!-- PWA -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
let deferredPrompt = null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
});
</script>
</body>
</html>
