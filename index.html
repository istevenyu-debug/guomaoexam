<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d5a3d">
<title>國貿丙檢練習平台</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<style>
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 36px;width:360px;max-width:100%;text-align:center;}
.login-logo{font-size:32px;margin-bottom:10px;}
.login-title{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
.login-note{font-size:11px;color:var(--text3);margin-top:16px;line-height:1.7;}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">📚</div>
    <div class="login-title">國貿丙檢練習平台</div>
    <div class="login-sub">國際貿易實務學科線上練習</div>

    <div class="form-row" style="text-align:left;">
      <label class="form-label">Email</label>
      <input class="form-input" id="email" type="email" placeholder="student@example.com">
    </div>
    <div class="form-row" style="text-align:left;">
      <label class="form-label">密碼</label>
      <input class="form-input" id="password" type="password" placeholder="請輸入密碼">
    </div>
    <button class="btn btn-primary" id="email-login-btn" style="width:100%;">使用 Email + 密碼登入</button>
    <button class="btn" id="reset-password-btn" style="width:100%;margin-top:8px;">忘記密碼 / 首次設定密碼</button>

    <div class="login-note">
      學生請使用 Email + 密碼登入。<br>
      若第一次設定密碼，請先輸入 Email 再點「忘記密碼 / 首次設定密碼」。
    </div>

    <!-- 開發者模式：點 LOGO 5下才出現 -->
    <div id="dev-panel" style="display:none;margin-top:20px;padding:14px;background:#f0ede6;border-radius:8px;border:1px dashed #c8c2b4;">
      <div style="font-size:11px;color:#9e9890;margin-bottom:10px;font-weight:600;">🛠 開發者預覽模式</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button onclick="devLogin('teacher')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">👩‍🏫 以老師身份進入</button>
        <button onclick="devLogin('student-active')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">🎓 以學生身份進入（已審核）</button>
        <button onclick="devLogin('student-pending')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">⏳ 以學生身份進入（待審核）</button>
        <button onclick="devLogin('public')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">💼 以社會人士身份進入</button>
        <button onclick="devLogin('onboard')" style="padding:8px;border:1px solid #e0dbd0;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">👋 首次設定頁面</button>
      </div>
    </div>
  </div>
</div>

<script>
// 點 LOGO 5下才顯示開發者模式
let clickCount = 0;
document.querySelector('.login-logo').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 3) {
    document.getElementById('dev-panel').style.display = 'block';
    clickCount = 0;
  }
});

// 網址加 ?dev 直接開啟開發者面板
if (new URLSearchParams(location.search).get('dev') !== null) {
  document.getElementById('dev-panel').style.display = 'block';
}

function devLogin(type) {
  if (type === 'teacher') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'teacher', name: '陳老師', email: 'istevenyu@gmail.com'
    }));
    window.location.href = 'teacher.html?dev=1';
  } else if (type === 'student-active') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'student', status: 'active', name: '王小明',
      email: 'student@test.com', class: '201', school: '測試學校'
    }));
    window.location.href = 'student.html?dev=1';
  } else if (type === 'student-pending') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'student', status: 'pending', name: '李大華',
      email: 'student2@test.com', class: '202', school: '測試學校'
    }));
    window.location.href = 'pending.html?dev=1';
  } else if (type === 'public') {
    sessionStorage.setItem('devMode', JSON.stringify({
      role: 'public', status: 'active', name: '張志遠',
      email: 'public@test.com', occupation: '上班族', purpose: '應試準備（丙級檢定）'
    }));
    window.location.href = 'student.html?dev=1';
  } else if (type === 'onboard') {
    window.location.href = 'onboard.html?dev=1';
  }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig, TEACHER_EMAIL } from "./js/config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 監聽登入狀態
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  // 老師直接進老師端
  if (user.email === TEACHER_EMAIL) {
    window.location.href = "teacher.html";
    return;
  }

    const data = await resolveUserProfile(user);
  if (!data) { window.location.href = "onboard.html"; return; }

  // 學生：待審核
  if (data.role === "student" && data.status === "pending") {
    window.location.href = "pending.html";
    return;
  }

  // 學生：被停權
  if (data.status === "disabled" || data.disabled === true) {
    alert("帳號已停權，請聯絡老師");
    await signOut(auth);
    return;
  }

  // 正常進入學生端
  window.location.href = "student.html";
});

async function resolveUserProfile(user) {
  const direct = await getDoc(doc(db, "users", user.uid));
  if (direct.exists()) return direct.data();
  const q = query(collection(db, "users"), where("email", "==", user.email), limit(1));
  const byEmail = await getDocs(q);
  if (byEmail.empty) return null;
  const found = byEmail.docs[0];
  const data = found.data();
  await setDoc(doc(db, "users", user.uid), { ...data, email: user.email, migratedFromUid: found.id, updatedAt: new Date() }, { merge: true });
  return data;
}

document.getElementById("email-login-btn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || !password) { alert("請輸入 Email 與密碼"); return; }
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    alert("登入失敗：" + e.message);
  }
});

document.getElementById("reset-password-btn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  if (!email) { alert("請先輸入 Email"); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    alert("已寄出密碼設定/重設信，請至信箱操作。");
  } catch(e) {
    alert("寄送失敗：" + e.message);
  }
});
</script>

<!-- PWA -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
let deferredPrompt = null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
});
</script>
</body>
</html>
