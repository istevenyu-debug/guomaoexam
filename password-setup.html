<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>設定密碼</title><link rel="stylesheet" href="css/style.css"></head><body><div class="center-wrap"><div class="onboard-box"><h2>設定登入密碼</h2><div class="form-row"><label class="form-label">Email</label><input id="email" class="form-input" type="email"></div><div class="form-row"><label class="form-label">新密碼</label><input id="p1" class="form-input" type="password" placeholder="至少 8 碼，建議英數混合"></div><div class="form-row"><label class="form-label">確認密碼</label><input id="p2" class="form-input" type="password"></div><button class="btn btn-primary" id="submit">完成設定</button><div id="msg" style="margin-top:12px;color:var(--text2);"></div></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, limit, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./js/config.js";
const db=getFirestore(initializeApp(firebaseConfig));
const qs = new URLSearchParams(location.search); const token = qs.get('token')||''; const emailQ=qs.get('email')||''; document.getElementById('email').value=emailQ;
const msg = (t,c='var(--text2)')=>{ const el=document.getElementById('msg'); el.style.color=c; el.textContent=t; };
if (!token) msg('此連結已過期，請聯繫管理員重新發送設定連結','var(--danger)');
async function sha256(text){const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');}
document.getElementById('submit').onclick=async()=>{
  const email=document.getElementById('email').value.trim(); const p1=document.getElementById('p1').value; const p2=document.getElementById('p2').value;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return msg('請輸入正確 email','var(--danger)');
  if (p1.length<8) return msg('密碼至少 8 碼，建議包含英文與數字','var(--danger)');
  if (p1!==p2) return msg('兩次輸入密碼需一致','var(--danger)');
  const tokenHash=await sha256(token);
  const tSnap = await getDocs(query(collection(db,'password_setup_tokens'), where('token_hash','==',tokenHash), limit(1)));
  if (tSnap.empty) return msg('此連結已使用，請直接登入或聯繫管理員','var(--danger)');
  const t=tSnap.docs[0]; const td=t.data();
  const exp=td.expires_at?.toDate ? td.expires_at.toDate() : new Date(td.expires_at);
  if (exp < new Date()) return msg('此連結已過期，請聯繫管理員重新發送設定連結','var(--danger)');
  if (td.used_at) return msg('此連結已使用，請直接登入或聯繫管理員','var(--danger)');
  const uref=doc(db,'users',td.user_id); await updateDoc(uref,{password_hash:'<由後端 Auth/雜湊服務寫入>',isPasswordSet:true,password_set_at:serverTimestamp(),passwordSetAt:serverTimestamp()});
  await updateDoc(t.ref,{used_at:serverTimestamp()});
  document.querySelector('.onboard-box').innerHTML='<h2>密碼設定成功！</h2><p>您現在可以使用 Email 與新密碼登入系統。</p><p>請立即以 LINE 通知您的導師：<br>「老師您好，我已完成帳號密碼設定，可以登入系統了。」</p>';
};
</script></body></html>
